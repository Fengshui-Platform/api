# ─── HTTP ONLY — dùng trong lúc init-ssl.sh lấy cert lần đầu ───────────────
# File này sẽ bị replace bởi api.conf sau khi cert được cấp

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tạm thời trả 200 để nginx khởi động được
    location / {
        return 200 '{"status":"initializing","message":"SSL setup in progress"}';
        add_header Content-Type application/json;
    }
}
